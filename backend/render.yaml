services:
  - type: web
    name: ai-resume-builder-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false  # Paste your Neon connection string
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: CORS_ORIGINS
        sync: false  # e.g. https://your-app.vercel.app,http://localhost:3000
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.6"
